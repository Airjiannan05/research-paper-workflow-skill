<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" role="img" aria-labelledby="title desc">
  <title id="title">Research Paper Workflow skill architecture</title>
  <desc id="desc">Layered architecture for the Research Paper Workflow skill family.</desc>
  <defs>
    <style>
      .bg{fill:#f7f8fb}.panel{fill:#fff;stroke:#d8dee8;stroke-width:1.4}.soft{fill:#f2f5f9}
      .title{font:700 28px system-ui,-apple-system,Segoe UI,sans-serif;fill:#172033}.sub{font:500 14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#5d6b82}
      .h{font:700 14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#253149}.t{font:600 13px system-ui,-apple-system,Segoe UI,sans-serif;fill:#253149}
      .m{font:500 11px system-ui,-apple-system,Segoe UI,sans-serif;fill:#637083}.tiny{font:600 10px system-ui,-apple-system,Segoe UI,sans-serif;fill:#738197}
      .line{stroke:#9aa7ba;stroke-width:1.6;fill:none}.dash{stroke:#aeb8c8;stroke-width:1.3;stroke-dasharray:5 5;fill:none}
      .early{fill:#dceafe}.evidence{fill:#d8f3e5}.exec{fill:#f8dce9}.write{fill:#e5e3ff}.review{fill:#ffe2bd}.final{fill:#e8dcff}.gov{fill:#fff2c8}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#8491a5"/>
    </marker>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="128%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#152033" flood-opacity=".08"/>
    </filter>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="60" y="58">Research Paper Workflow Architecture</text>
  <text class="sub" x="60" y="86">A routed family of independent rpw-* skills with shared governance, reusable templates, and provenance gates.</text>

  <rect class="panel gov" x="60" y="120" width="1080" height="106" rx="10" filter="url(#shadow)"/>
  <text class="h" x="86" y="150">Entry and Governance Layer</text>
  <text class="m" x="86" y="174">Root SKILL.md routes the user's intent, then loads exactly one matching skill unless the workflow explicitly hands off.</text>
  <rect class="panel" x="86" y="190" width="176" height="52" rx="8"/>
  <text class="t" x="106" y="213">rpw-common</text>
  <text class="tiny" x="106" y="231">routing, source checks, state</text>
  <rect class="panel" x="286" y="190" width="176" height="52" rx="8"/>
  <text class="t" x="306" y="213">rpw-pipeline</text>
  <text class="tiny" x="306" y="231">project setup, gates, stages</text>
  <rect class="soft" x="502" y="190" width="606" height="52" rx="8"/>
  <text class="t" x="522" y="213">Shared contracts</text>
  <text class="tiny" x="522" y="231">human accountability, no fabricated evidence, artifact ownership, next-step menu</text>

  <path class="line" d="M600 226 V268" marker-end="url(#arrow)"/>

  <rect class="panel" x="60" y="270" width="1080" height="284" rx="12" filter="url(#shadow)"/>
  <text class="h" x="86" y="302">Runtime Skills Loaded On Demand</text>

  <g transform="translate(86 326)">
    <rect class="early" x="0" y="0" width="144" height="188" rx="10"/>
    <text class="h" x="16" y="28">Ideation</text>
    <text class="m" x="16" y="56">1 Idea optimize</text>
    <text class="m" x="16" y="80">2 Idea review</text>
    <text class="m" x="16" y="104">3 Literature monitor</text>
    <text class="m" x="16" y="128">4 Literature search</text>
  </g>
  <g transform="translate(246 326)">
    <rect class="evidence" x="0" y="0" width="144" height="188" rx="10"/>
    <text class="h" x="16" y="28">Evidence</text>
    <text class="m" x="16" y="56">5 Claim manifest</text>
    <text class="m" x="16" y="80">6 Experiment design</text>
    <text class="tiny" x="16" y="128">Claim to evidence</text>
    <text class="tiny" x="16" y="146">Design rationale</text>
  </g>
  <g transform="translate(406 326)">
    <rect class="exec" x="0" y="0" width="144" height="188" rx="10"/>
    <text class="h" x="16" y="28">Execution</text>
    <text class="m" x="16" y="56">7 Implementation</text>
    <text class="m" x="16" y="80">8 Result engineering</text>
    <text class="m" x="16" y="104">9 Result analysis</text>
    <text class="tiny" x="16" y="146">Logs, seeds, tables</text>
  </g>
  <g transform="translate(566 326)">
    <rect class="write" x="0" y="0" width="144" height="188" rx="10"/>
    <text class="h" x="16" y="28">Writing</text>
    <text class="m" x="16" y="56">10 Paper writer</text>
    <text class="tiny" x="16" y="104">Draft, polish, compress</text>
    <text class="tiny" x="16" y="122">Preserve author intent</text>
  </g>
  <g transform="translate(726 326)">
    <rect class="review" x="0" y="0" width="144" height="188" rx="10"/>
    <text class="h" x="16" y="28">Review</text>
    <text class="m" x="16" y="56">11 Paper reviewer</text>
    <text class="m" x="16" y="80">12 Integrity audit</text>
    <text class="tiny" x="16" y="128">Reviewer panel</text>
    <text class="tiny" x="16" y="146">Citation support check</text>
  </g>
  <g transform="translate(886 326)">
    <rect class="final" x="0" y="0" width="222" height="188" rx="10"/>
    <text class="h" x="16" y="28">Submission and Revision</text>
    <text class="m" x="16" y="56">13 Submission check</text>
    <text class="m" x="16" y="80">14 Rebuttal</text>
    <text class="tiny" x="16" y="128">Compliance, anonymity, PDF</text>
    <text class="tiny" x="16" y="146">Response letter, revision ledger</text>
  </g>

  <path class="dash" d="M230 420 H246"/>
  <path class="dash" d="M390 420 H406"/>
  <path class="dash" d="M550 420 H566"/>
  <path class="dash" d="M710 420 H726"/>
  <path class="dash" d="M870 420 H886"/>

  <rect class="panel" x="60" y="586" width="336" height="92" rx="10"/>
  <text class="h" x="86" y="617">Shared References</text>
  <text class="m" x="86" y="642">workflow, routing, source verification, writing, review, rebuttal</text>
  <text class="tiny" x="86" y="662">Loaded only when a selected skill needs them.</text>

  <rect class="panel" x="432" y="586" width="336" height="92" rx="10"/>
  <text class="h" x="458" y="617">Templates and Scripts</text>
  <text class="m" x="458" y="642">paper cards, claim manifests, run matrices, logs, checklists</text>
  <text class="tiny" x="458" y="662">Standard-library Python tools keep artifacts machine-checkable.</text>

  <rect class="panel" x="804" y="586" width="336" height="92" rx="10"/>
  <text class="h" x="830" y="617">Installation Surfaces</text>
  <text class="m" x="830" y="642">Claude Code, OpenAI Codex CLI, Custom GPT, Cursor, Windsurf</text>
  <text class="tiny" x="830" y="662">Manifest files expose the same routed workflow to each host.</text>
</svg>
